name: monitoring

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    restart: unless-stopped
    user: "65534:65534"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=20GB"
      - "--web.enable-lifecycle"
    volumes:
      - /home/eadminsc/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /home/eadminsc/monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - /home/eadminsc/monitoring/prometheus/data:/prometheus
    ports:
      - "${LAN_IP:?set in .env}:9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [monitoring]
    logging: *default-logging

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    user: "65534:65534"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - /home/eadminsc/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - /home/eadminsc/monitoring/alertmanager/data:/alertmanager
    ports:
      - "${LAN_IP}:9093:9093"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [monitoring]
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    restart: unless-stopped
    user: "472:472"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:?set in .env}
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL:-https://grafana.example.com}
      GF_SERVER_DOMAIN: ${GF_DOMAIN:-grafana.example.com}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - /home/eadminsc/monitoring/grafana/data:/var/lib/grafana
      - /home/eadminsc/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${LAN_IP}:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [monitoring]
    logging: *default-logging

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|var/lib/docker/.+)($$|/)"
    volumes:
      - /:/host:ro,rslave
    ports:
      - "${LAN_IP}:9100:9100"
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices: [/dev/kmsg]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - "${LAN_IP}:9101:8080"
    logging: *default-logging

networks:
  monitoring:
    driver: bridge
