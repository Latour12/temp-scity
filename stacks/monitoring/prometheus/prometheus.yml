global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: scity
    env: prod

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ===== Self =====
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  # ===== Hosts (node-exporter) =====
  - job_name: node
    static_configs:
      - targets: ["10.61.21.133:9100"]
        labels: { host: odoo-host }
      - targets: ["10.61.21.143:9100"]
        labels: { host: edge-host }
      - targets: ["10.61.21.147:9100"]
        labels: { host: mon-host }

  # ===== Containers (cadvisor) =====
  - job_name: cadvisor
    static_configs:
      - targets: ["10.61.21.133:9101"]
        labels: { host: odoo-host }
      - targets: ["10.61.21.143:9101"]
        labels: { host: edge-host }
      - targets: ["10.61.21.147:9101"]
        labels: { host: mon-host }

  # ===== Nginx =====
  - job_name: nginx
    static_configs:
      - targets: ["10.61.21.143:9113"]

  # ===== Keycloak (management port) =====
  - job_name: keycloak
    metrics_path: /metrics
    static_configs:
      - targets: ["10.61.21.143:9000"]

  # ===== PostgreSQL exporters (deployed next to their DB) =====
  - job_name: postgres-odoo
    static_configs:
      - targets: ["10.61.21.133:9187"]
        labels: { instance: odoo-db }

  - job_name: postgres-keycloak
    static_configs:
      - targets: ["10.61.21.143:9187"]
        labels: { instance: keycloak-db }
