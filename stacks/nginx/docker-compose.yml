name: nginx

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/eadminsc/nginx/etc/nginx.conf:/etc/nginx/nginx.conf:ro
      - /home/eadminsc/nginx/etc/conf.d:/etc/nginx/conf.d:ro
      - /home/eadminsc/nginx/etc/sites-enabled:/etc/nginx/sites-enabled:ro
      - /home/eadminsc/nginx/etc/snippets:/etc/nginx/snippets:ro
      - /home/eadminsc/nginx/letsencrypt:/etc/letsencrypt:ro
      - /home/eadminsc/nginx/webroot:/var/www/certbot
      - /home/eadminsc/nginx/logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [edge]
    logging: *default-logging

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    restart: unless-stopped
    entrypoint: /bin/sh -c
    command: >
      "trap exit TERM;
       while :; do
         certbot renew --webroot -w /var/www/certbot --quiet;
         sleep 12h & wait $${!};
       done"
    volumes:
      - /home/eadminsc/nginx/letsencrypt:/etc/letsencrypt
      - /home/eadminsc/nginx/webroot:/var/www/certbot
    logging: *default-logging

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3
    container_name: nginx-exporter
    restart: unless-stopped
    command: ["--nginx.scrape-uri=http://nginx/stub_status"]
    depends_on: [nginx]
    ports:
      - "${LAN_IP:?set in .env}:9113:9113"
    networks: [edge]
    logging: *default-logging

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|var/lib/docker/.+)($$|/)"
    volumes:
      - /:/host:ro,rslave
    ports:
      - "${LAN_IP}:9100:9100"
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices: [/dev/kmsg]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - "${LAN_IP}:9101:8080"
    logging: *default-logging

networks:
  edge:
    external: true
