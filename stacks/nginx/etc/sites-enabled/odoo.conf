# Odoo backend lives on 10.61.21.133 — direct LAN, no DNS, HTTP keep-alive.
upstream odoo_app {
    server 10.61.21.133:8069;
    keepalive 32;
    keepalive_timeout 60s;
}
upstream odoo_chat {
    server 10.61.21.133:8072;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name odoo.example.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name odoo.example.com;

    ssl_certificate     /etc/letsencrypt/live/odoo.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/odoo.example.com/privkey.pem;
    include /etc/nginx/snippets/ssl.conf;

    client_max_body_size 500m;
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_redirect off;
    proxy_http_version 1.1;

    # ===== WebSocket / longpolling =====
    location /websocket {
        proxy_pass http://odoo_chat;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
    location /longpolling {
        proxy_pass http://odoo_chat;
        proxy_set_header Connection "";
    }

    # ===== Static assets : cache + keep-alive =====
    location ~* /web/static/ {
        proxy_pass http://odoo_app;
        proxy_set_header Connection "";
        proxy_cache_valid 200 60m;
        proxy_buffering on;
        expires 864000;
    }

    # ===== Main =====
    location / {
        proxy_pass http://odoo_app;
        proxy_set_header Connection "";
        proxy_buffers 16 64k;
        proxy_buffer_size 128k;
    }

    gzip on;
    gzip_types text/css text/less text/plain text/xml application/xml application/json application/javascript;
}
