name: odoo

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  db:
    image: postgres:16-alpine
    container_name: odoo-db
    restart: unless-stopped
    shm_size: 1gb
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      PG_EXPORTER_USER: ${PG_EXPORTER_USER:-monitoring}
      PG_EXPORTER_PASSWORD: ${PG_EXPORTER_PASSWORD:?set in .env}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    volumes:
      - /home/eadminsc/odoo/postgres/data:/var/lib/postgresql/data
      - /home/eadminsc/odoo/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - /home/eadminsc/odoo/postgres/init:/docker-entrypoint-initdb.d:ro
      - /home/eadminsc/odoo/postgres/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]
    logging: *default-logging

  odoo:
    image: odoo:19
    container_name: odoo-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: ${POSTGRES_USER:-odoo}
      PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    command: ["odoo", "-c", "/etc/odoo/odoo.conf"]
    volumes:
      - /home/eadminsc/odoo/config/odoo.conf:/etc/odoo/odoo.conf:ro
      - /home/eadminsc/odoo/data:/var/lib/odoo
      - /home/eadminsc/odoo/addons/enterprise:/mnt/enterprise:ro
      - /home/eadminsc/odoo/addons/extra:/mnt/extra-addons
      - /home/eadminsc/odoo/logs:/var/log/odoo
    ports:
      - "${LAN_IP:?set in .env}:8069:8069"
      - "${LAN_IP}:8072:8072"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8069/web/database/selector >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks: [internal]
    logging: *default-logging

  pg-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: odoo-pg-exporter
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    environment:
      DATA_SOURCE_NAME: "postgresql://${PG_EXPORTER_USER:?}:${PG_EXPORTER_PASSWORD:?}@db:5432/postgres?sslmode=disable"
    ports:
      - "${LAN_IP}:9187:9187"
    networks: [internal]
    logging: *default-logging

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|var/lib/docker/.+)($$|/)"
    volumes:
      - /:/host:ro,rslave
    ports:
      - "${LAN_IP}:9100:9100"
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices: [/dev/kmsg]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - "${LAN_IP}:9101:8080"
    logging: *default-logging

networks:
  internal:
    driver: bridge
